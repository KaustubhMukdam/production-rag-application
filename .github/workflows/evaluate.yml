name: Evaluate RAG

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "learnings/**"
      - "*.md"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python -m eval.run_eval --provider groq --sample 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
